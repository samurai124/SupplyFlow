<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:h="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <style>
        body{
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border: 1px solid black;
            width: fit-content;
            padding: 16px;
            border-radius: 5px;

        }
        .form-elemet{
            display: flex;
            flex-direction: column;
            align-items: start;
            gap: 16px;
        }
        table{
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            width: 150px;
            height: 60px;
            border: 1px solid black;
            text-align: center;
        }

        .edit-container{
            display: none;
        }
    </style>
</head>
<body>
<div class="form-container">
    <form action="/produit1" method="post">
        <div class="form-elemet">
            <label>Fournisseur :</label>
            <select name="fournisseur">
                <option th:each="four : ${fournisseurs}" name="fournisseur" th:value="${four.id}"
                        th:text="${four.nom}"></option>
            </select>
        </div>
        <div class="form-elemet">
            <label>Nom :</label>
            <input type="text" name="nom">
        </div>
        <div class="form-elemet">
            <label>Categorie :</label>
            <input type="text" name="categorie">
        </div>
        <div class="form-elemet">
            <label>Prix :</label>
            <input type="text" name="prix">
        </div>
        <div class="form-elemet">
            <label>Quantite :</label>
            <input type="text" name="quantite">
        </div>
        <div class="form-elemet">
            <input type="submit" value="Ajouter">
        </div>
    </form>
</div>
<div class="list-container">
    <table>
        <thead>
        <th>Id</th>
        <th>Nom</th>
        <th>Categorie</th>
        <th>Prix</th>
        <th>Quantite</th>
        <th>Fournisseurs</th>
        <th>Actions</th>
        </thead>
        <tbody>
        <tr th:each="p : ${produits}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nom}"></td>
            <td th:text="${p.categorie}"></td>
            <td th:text="${p.quantite}"></td>
            <td th:text="${p.prix}"></td>
            <td >
                <span th:each="f : ${p.fournisseurs}" th:text="${f.nom}"></span>
            </td>
            <td>
                <button  th:attr="data-id=${p.id}, data-nom=${p.nom}, data-categorie=${p.categorie}, data-prix=${p.prix}, data-quantite=${p.quantite}, data-fournisseur=${p.fournisseurs.size() > 0 ? p.fournisseurs[0].id : ''}"
                         onclick="openEdit(this)">edit</button>
                <button>delete</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div class="edit-container">
    <form  method="post" onsubmit="submitEdit()">
        <input type="hidden" name="id" id="id">
        <div class="form-elemet">
            <label>Fournisseur :</label>
            <select name="fournisseur" id="fournisseur">
                <option th:each="four : ${fournisseurs}" name="fournisseur" th:value="${four.id}"
                        th:text="${four.nom}"></option>
            </select>
        </div>
        <div class="form-elemet">
            <label>Nom :</label>
            <input type="text" name="nom" id="nom">
        </div>
        <div class="form-elemet">
            <label>Categorie :</label>
            <input type="text" name="categorie" id="categorie">
        </div>
        <div class="form-elemet">
            <label>Prix :</label>
            <input type="text" name="prix" id="prix">
        </div>
        <div class="form-elemet">
            <label>Quantite :</label>
            <input type="text" name="quantite" id="quantite">
        </div>
        <div class="form-elemet">
            <input type="submit" value="Ajouter">
        </div>
    </form>
</div>
<script>
    let edit_container = document.querySelector(".edit-container");
    let id = document.querySelector("#id");
    let nom  = document.querySelector("#nom");
    let categorie = document.querySelector("#categorie");
    let prix = document.querySelector("#prix");
    let quantite = document.querySelector("#quantite");
    let fournisseur = document.querySelector("#fournisseur");

    function openEdit(e){
        if (edit_container.style.display == "none"){
            edit_container.style.display = "block";
        }
        else{
            edit_container.style.display = "none";
        }
        id.value = e.dataset.id;
        nom.value = e.dataset.nom;
        categorie.value = e.dataset.categorie;
        prix.value = e.dataset.prix;
        quantite.value = e.dataset.quantite;
        fournisseur.value = e.dataset.fournisseur;
    }

    function submitEdit(){
        let produit = {
            id: id.value,
            nom: nom.value,
            categorie: categorie.value,
            prix: prix.value,
            quantite: quantite.value,
        }
        fetch("/produit1"+id,fournisseur.value, {
            method: "post",
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(produit)
        }).then(res => res.ok ? location.reload() : alert("Update failed"));
    }

</script>

</body>
</html>
